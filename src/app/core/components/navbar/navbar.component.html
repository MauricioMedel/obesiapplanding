<header class="navbar" [class.navbar--scrolled]="scrolled" role="banner">
  <div class="container navbar__inner">
    <!-- Logo -->
    <a class="navbar__logo" href="#" (click)="scrollTo('inicio')" aria-label="ObesiApp inicio">
      <span class="navbar__logo-icon">🥦</span>
      <span class="navbar__logo-text">Obesi<strong>App</strong></span>
    </a>

    <!-- Desktop Nav -->
    <nav class="navbar__nav" role="navigation" aria-label="Navegación principal">
      <ul class="navbar__links">
        <li *ngFor="let link of navLinks">
          <a
            class="navbar__link"
            href="#"
            (click)="$event.preventDefault(); scrollTo(link.id)"
            [attr.aria-label]="'Ir a ' + link.label"
          >{{ link.label }}</a>
        </li>
      </ul>
    </nav>

    <!-- CTA Button -->
    <button
      class="btn btn--primary navbar__cta"
      (click)="scrollTo('descargar')"
      aria-label="Descargar ObesiApp"
    >
      📱 Descargar App
    </button>

    <!-- Hamburger -->
    <button
      class="navbar__hamburger"
      [class.navbar__hamburger--active]="menuOpen"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Abrir menú"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="navbar__mobile" [class.navbar__mobile--open]="menuOpen" role="dialog" aria-label="Menú móvil">
    <ul class="navbar__mobile-links">
      <li *ngFor="let link of navLinks">
        <a
          href="#"
          (click)="$event.preventDefault(); scrollTo(link.id)"
        >{{ link.label }}</a>
      </li>
      <li>
        <button class="btn btn--primary" (click)="scrollTo('descargar')">📱 Descargar App</button>
      </li>
    </ul>
  </div>
</header>
